<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1e2a3a"/><stop offset="100%" style="stop-color:#162030"/></linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect x="10" y="10" width="380" height="380" rx="12" fill="#212e3e" stroke="#00d4ff22" stroke-width="1.5"/>
  <rect x="410" y="10" width="380" height="380" rx="12" fill="#253447" stroke="#00d4ff22" stroke-width="1.5"/>

  <!-- LEFT: Lunge start - standing upright -->
  <circle cx="200" cy="100" r="22" fill="#c8a06a" stroke="#e0b87a" stroke-width="1.5"/>
  <ellipse cx="200" cy="86" rx="19" ry="11" fill="#3a2a1a"/>
  <rect x="192" y="120" width="16" height="14" rx="4" fill="#c8a06a"/>
  <rect x="177" y="133" width="46" height="78" rx="12" fill="#4a90d9"/>
  <line x1="200" y1="140" x2="200" y2="198" stroke="#00d4ff" stroke-width="1.5" opacity="0.3"/>
  <!-- Arms at sides -->
  <line x1="179" y1="148" x2="162" y2="205" stroke="#4a90d9" stroke-width="12" stroke-linecap="round"/>
  <line x1="223" y1="148" x2="238" y2="205" stroke="#4a90d9" stroke-width="12" stroke-linecap="round"/>
  <ellipse cx="159" cy="208" rx="10" ry="7" fill="#c8a06a"/>
  <ellipse cx="241" cy="208" rx="10" ry="7" fill="#c8a06a"/>
  <!-- Legs straight together -->
  <line x1="193" y1="211" x2="186" y2="330" stroke="#4a90d9" stroke-width="16" stroke-linecap="round"/>
  <line x1="207" y1="211" x2="214" y2="330" stroke="#3a80c9" stroke-width="16" stroke-linecap="round"/>
  <ellipse cx="182" cy="334" rx="15" ry="9" fill="#2a2a2a"/>
  <ellipse cx="218" cy="334" rx="15" ry="9" fill="#2a2a2a"/>
  <!-- Ground -->
  <line x1="20" y1="345" x2="380" y2="345" stroke="#2a3f55" stroke-width="2"/>

  <!-- RIGHT: Lunge working - front knee 90 degrees -->
  <circle cx="560" cy="110" r="22" fill="#c8a06a" stroke="#e0b87a" stroke-width="1.5"/>
  <ellipse cx="560" cy="96" rx="19" ry="11" fill="#3a2a1a"/>
  <rect x="552" y="130" width="16" height="14" rx="4" fill="#c8a06a"/>
  <!-- Torso upright -->
  <rect x="537" y="143" width="46" height="75" rx="12" fill="#4a90d9"/>
  <line x1="560" y1="150" x2="560" y2="205" stroke="#00d4ff" stroke-width="1.5" opacity="0.3"/>
  <!-- Arms bent for balance -->
  <line x1="539" y1="158" x2="515" y2="190" stroke="#4a90d9" stroke-width="12" stroke-linecap="round"/>
  <line x1="583" y1="158" x2="605" y2="190" stroke="#4a90d9" stroke-width="12" stroke-linecap="round"/>
  <!-- FRONT LEG bent 90deg (cyan - quad working) -->
  <line x1="549" y1="218" x2="515" y2="268" stroke="#00d4ff" stroke-width="17" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="515" y1="268" x2="518" y2="330" stroke="#4a90d9" stroke-width="14" stroke-linecap="round"/>
  <!-- Front knee highlight -->
  <circle cx="516" cy="269" r="14" fill="#00d4ff" opacity="0.5" filter="url(#glow)"/>
  <!-- Front quad glow -->
  <ellipse cx="533" cy="242" rx="22" ry="28" fill="#00d4ff" opacity="0.3" filter="url(#glow)"/>
  <!-- BACK LEG - knee near ground, shin angled -->
  <line x1="571" y1="218" x2="615" y2="252" stroke="#4a90d9" stroke-width="15" stroke-linecap="round"/>
  <line x1="615" y1="252" x2="620" y2="330" stroke="#3a80c9" stroke-width="13" stroke-linecap="round"/>
  <!-- Glute highlight -->
  <ellipse cx="565" cy="225" rx="25" ry="18" fill="#00d4ff" opacity="0.25" filter="url(#glow)"/>
  <!-- Feet -->
  <ellipse cx="514" cy="334" rx="16" ry="9" fill="#2a2a2a"/>
  <ellipse cx="623" cy="334" rx="16" ry="9" fill="#2a2a2a"/>
  <!-- Ground -->
  <line x1="420" y1="345" x2="780" y2="345" stroke="#2a3f55" stroke-width="2"/>
</svg>
