<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1e2a3a"/><stop offset="100%" style="stop-color:#162030"/></linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect x="10" y="10" width="380" height="380" rx="12" fill="#212e3e" stroke="#00d4ff22" stroke-width="1.5"/>
  <rect x="410" y="10" width="380" height="380" rx="12" fill="#253447" stroke="#00d4ff22" stroke-width="1.5"/>

  <!-- LEFT: Diamond push-up start (arms straight, hands close diamond) -->
  <circle cx="100" cy="185" r="20" fill="#c8a06a" stroke="#e0b87a" stroke-width="1.5"/>
  <ellipse cx="100" cy="172" rx="18" ry="10" fill="#3a2a1a"/>
  <rect x="109" y="184" width="10" height="12" rx="3" fill="#c8a06a"/>
  <!-- Torso horizontal -->
  <rect x="118" y="179" width="150" height="26" rx="10" fill="#4a90d9"/>
  <ellipse cx="193" cy="192" rx="55" ry="10" fill="#00d4ff" opacity="0.25"/>
  <!-- Arms close together forming diamond - angled to center -->
  <line x1="125" y1="192" x2="170" y2="245" stroke="#4a90d9" stroke-width="13" stroke-linecap="round"/>
  <line x1="140" y1="192" x2="178" y2="245" stroke="#3a80c9" stroke-width="13" stroke-linecap="round"/>
  <!-- Diamond hands (close together) -->
  <ellipse cx="168" cy="248" rx="13" ry="8" fill="#c8a06a"/>
  <ellipse cx="180" cy="248" rx="13" ry="8" fill="#b89060"/>
  <!-- Diamond shape indicator -->
  <polygon points="167,240 180,234 193,240 180,248" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
  <!-- Tricep/chest highlight -->
  <ellipse cx="132" cy="193" rx="14" ry="11" fill="#00d4ff" opacity="0.4" filter="url(#glow)"/>
  <!-- Legs extended -->
  <line x1="268" y1="189" x2="355" y2="200" stroke="#4a90d9" stroke-width="14" stroke-linecap="round"/>
  <line x1="268" y1="197" x2="355" y2="208" stroke="#3a80c9" stroke-width="12" stroke-linecap="round"/>
  <ellipse cx="358" cy="202" rx="12" ry="7" fill="#2a2a2a"/>
  <ellipse cx="358" cy="210" rx="12" ry="7" fill="#2a2a2a"/>
  <!-- Ground -->
  <line x1="20" y1="257" x2="380" y2="257" stroke="#2a3f55" stroke-width="2"/>

  <!-- RIGHT: Diamond push-up lowered position -->
  <circle cx="500" cy="205" r="20" fill="#c8a06a" stroke="#e0b87a" stroke-width="1.5"/>
  <ellipse cx="500" cy="192" rx="18" ry="10" fill="#3a2a1a"/>
  <rect x="509" y="204" width="10" height="12" rx="3" fill="#c8a06a"/>
  <!-- Torso lower (body closer to ground) -->
  <rect x="518" y="200" width="150" height="24" rx="10" fill="#4a90d9"/>
  <ellipse cx="593" cy="212" rx="55" ry="9" fill="#00d4ff" opacity="0.35"/>
  <!-- Arms BENT at elbow - elbows flared back -->
  <line x1="525" y1="210" x2="548" y2="255" stroke="#00d4ff" stroke-width="14" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="540" y1="210" x2="558" y2="255" stroke="#00d4ff" stroke-width="14" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Hands (still diamond) -->
  <ellipse cx="546" cy="258" rx="13" ry="8" fill="#c8a06a"/>
  <ellipse cx="560" cy="258" rx="13" ry="8" fill="#b89060"/>
  <!-- Tricep glow (muscle being worked) -->
  <ellipse cx="535" cy="232" rx="22" ry="16" fill="#00d4ff" opacity="0.45" filter="url(#glow)"/>
  <!-- Chest close to ground glow -->
  <ellipse cx="593" cy="215" rx="50" ry="12" fill="#00d4ff" opacity="0.2" filter="url(#glow)"/>
  <!-- Legs extended -->
  <line x1="668" y1="208" x2="755" y2="218" stroke="#4a90d9" stroke-width="14" stroke-linecap="round"/>
  <line x1="668" y1="216" x2="755" y2="226" stroke="#3a80c9" stroke-width="12" stroke-linecap="round"/>
  <ellipse cx="758" cy="220" rx="12" ry="7" fill="#2a2a2a"/>
  <ellipse cx="758" cy="228" rx="12" ry="7" fill="#2a2a2a"/>
  <!-- Ground -->
  <line x1="420" y1="267" x2="780" y2="267" stroke="#2a3f55" stroke-width="2"/>
</svg>
