<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1e2a3a"/><stop offset="100%" style="stop-color:#162030"/></linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect x="10" y="10" width="380" height="380" rx="12" fill="#212e3e" stroke="#00d4ff22" stroke-width="1.5"/>
  <rect x="410" y="10" width="380" height="380" rx="12" fill="#253447" stroke="#00d4ff22" stroke-width="1.5"/>

  <!-- LEFT: Plank starting position -->
  <!-- Head -->
  <circle cx="105" cy="185" r="20" fill="#c8a06a" stroke="#e0b87a" stroke-width="1.5"/>
  <!-- Hair -->
  <ellipse cx="105" cy="172" rx="18" ry="10" fill="#3a2a1a"/>
  <!-- Neck -->
  <rect x="114" y="185" width="10" height="12" rx="3" fill="#c8a06a"/>
  <!-- Torso - horizontal plank -->
  <rect x="124" y="180" width="140" height="28" rx="10" fill="#4a90d9"/>
  <!-- Core muscle highlight -->
  <ellipse cx="194" cy="194" rx="50" ry="11" fill="#00d4ff" opacity="0.35"/>
  <!-- Shoulder highlight -->
  <circle cx="128" cy="188" r="12" fill="#00d4ff" opacity="0.5" filter="url(#glow)"/>
  <!-- Left arm down to ground -->
  <line x1="128" y1="195" x2="100" y2="248" stroke="#4a90d9" stroke-width="12" stroke-linecap="round"/>
  <!-- Right arm -->
  <line x1="140" y1="197" x2="113" y2="250" stroke="#3a80c9" stroke-width="12" stroke-linecap="round"/>
  <!-- Hands -->
  <ellipse cx="98" cy="251" rx="12" ry="7" fill="#c8a06a"/>
  <ellipse cx="111" cy="253" rx="12" ry="7" fill="#b89060"/>
  <!-- Ground -->
  <line x1="60" y1="258" x2="380" y2="258" stroke="#2a3f55" stroke-width="2"/>
  <!-- Legs extended -->
  <line x1="264" y1="190" x2="330" y2="200" stroke="#4a90d9" stroke-width="14" stroke-linecap="round"/>
  <line x1="330" y1="200" x2="370" y2="205" stroke="#4a90d9" stroke-width="12" stroke-linecap="round"/>
  <line x1="264" y1="200" x2="330" y2="212" stroke="#3a70b9" stroke-width="12" stroke-linecap="round"/>
  <line x1="330" y1="212" x2="370" y2="217" stroke="#3a70b9" stroke-width="10" stroke-linecap="round"/>
  <!-- Feet -->
  <ellipse cx="372" cy="207" rx="11" ry="6" fill="#2a2a2a"/>
  <ellipse cx="372" cy="219" rx="11" ry="6" fill="#2a2a2a"/>

  <!-- RIGHT: Mountain Climber working - knee pulled to chest -->
  <circle cx="505" cy="185" r="20" fill="#c8a06a" stroke="#e0b87a" stroke-width="1.5"/>
  <ellipse cx="505" cy="172" rx="18" ry="10" fill="#3a2a1a"/>
  <rect x="514" y="185" width="10" height="12" rx="3" fill="#c8a06a"/>
  <rect x="524" y="180" width="140" height="28" rx="10" fill="#4a90d9"/>
  <!-- Core highlight (very active) -->
  <ellipse cx="594" cy="194" rx="50" ry="11" fill="#00d4ff" opacity="0.6" filter="url(#glow)"/>
  <circle cx="528" cy="188" r="12" fill="#00d4ff" opacity="0.6" filter="url(#glow)"/>
  <line x1="528" y1="195" x2="500" y2="248" stroke="#4a90d9" stroke-width="12" stroke-linecap="round"/>
  <line x1="540" y1="197" x2="513" y2="250" stroke="#3a80c9" stroke-width="12" stroke-linecap="round"/>
  <ellipse cx="498" cy="251" rx="12" ry="7" fill="#c8a06a"/>
  <ellipse cx="511" cy="253" rx="12" ry="7" fill="#b89060"/>
  <line x1="60" y1="258" x2="380" y2="258" stroke="#2a3f55" stroke-width="2" transform="translate(400,0)"/>
  <!-- Extended back leg -->
  <line x1="664" y1="190" x2="730" y2="198" stroke="#4a90d9" stroke-width="14" stroke-linecap="round"/>
  <line x1="730" y1="198" x2="767" y2="202" stroke="#4a90d9" stroke-width="12" stroke-linecap="round"/>
  <ellipse cx="770" cy="204" rx="11" ry="6" fill="#2a2a2a"/>
  <!-- Knee pulled to chest (CYAN highlight) -->
  <line x1="664" y1="202" x2="640" y2="225" stroke="#00d4ff" stroke-width="14" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="640" y1="225" x2="600" y2="215" stroke="#00d4ff" stroke-width="13" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Knee cap glow -->
  <circle cx="640" cy="225" r="16" fill="#00d4ff" opacity="0.5" filter="url(#glow)"/>
  <!-- Core glow (abs working) -->
  <ellipse cx="605" cy="205" rx="35" ry="18" fill="#00d4ff" opacity="0.25" filter="url(#glow)"/>
</svg>
