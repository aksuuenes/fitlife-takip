<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1e2a3a"/><stop offset="100%" style="stop-color:#162030"/></linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect x="10" y="10" width="380" height="380" rx="12" fill="#212e3e" stroke="#00d4ff22" stroke-width="1.5"/>
  <rect x="410" y="10" width="380" height="380" rx="12" fill="#253447" stroke="#00d4ff22" stroke-width="1.5"/>

  <!-- LEFT: Pistol squat start - standing on one leg -->
  <circle cx="200" cy="100" r="22" fill="#c8a06a" stroke="#e0b87a" stroke-width="1.5"/>
  <ellipse cx="200" cy="86" rx="19" ry="11" fill="#3a2a1a"/>
  <rect x="192" y="120" width="16" height="14" rx="4" fill="#c8a06a"/>
  <rect x="177" y="133" width="46" height="78" rx="12" fill="#4a90d9"/>
  <!-- Arms extended for balance -->
  <line x1="179" y1="148" x2="145" y2="155" stroke="#4a90d9" stroke-width="12" stroke-linecap="round"/>
  <line x1="223" y1="148" x2="257" y2="155" stroke="#4a90d9" stroke-width="12" stroke-linecap="round"/>
  <ellipse cx="142" cy="156" rx="10" ry="7" fill="#c8a06a"/>
  <ellipse cx="260" cy="156" rx="10" ry="7" fill="#c8a06a"/>
  <!-- Standing leg -->
  <line x1="200" y1="211" x2="200" y2="330" stroke="#4a90d9" stroke-width="16" stroke-linecap="round"/>
  <!-- Other leg slightly raised -->
  <line x1="200" y1="225" x2="230" y2="260" stroke="#3a80c9" stroke-width="14" stroke-linecap="round"/>
  <!-- Feet -->
  <ellipse cx="197" cy="334" rx="16" ry="9" fill="#2a2a2a"/>
  <!-- Ground -->
  <line x1="20" y1="342" x2="380" y2="342" stroke="#2a3f55" stroke-width="2"/>

  <!-- RIGHT: Pistol squat working - single leg squat deep -->
  <circle cx="580" cy="145" r="22" fill="#c8a06a" stroke="#e0b87a" stroke-width="1.5"/>
  <ellipse cx="580" cy="131" rx="19" ry="11" fill="#3a2a1a"/>
  <rect x="572" y="165" width="16" height="12" rx="4" fill="#c8a06a"/>
  <!-- Torso -->
  <rect x="558" y="176" width="44" height="60" rx="12" fill="#4a90d9"/>
  <!-- Arms extended forward for balance -->
  <line x1="560" y1="193" x2="515" y2="195" stroke="#4a90d9" stroke-width="12" stroke-linecap="round"/>
  <line x1="602" y1="193" x2="645" y2="195" stroke="#4a90d9" stroke-width="12" stroke-linecap="round"/>
  <ellipse cx="511" cy="196" rx="10" ry="7" fill="#c8a06a"/>
  <ellipse cx="649" cy="196" rx="10" ry="7" fill="#c8a06a"/>
  <!-- Supporting leg BENT deep (cyan quads) -->
  <line x1="578" y1="236" x2="558" y2="280" stroke="#00d4ff" stroke-width="17" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="558" y1="280" x2="562" y2="330" stroke="#4a90d9" stroke-width="14" stroke-linecap="round"/>
  <!-- Quad glow -->
  <ellipse cx="567" cy="258" rx="22" ry="25" fill="#00d4ff" opacity="0.35" filter="url(#glow)"/>
  <!-- Extended leg held horizontal (cyan) -->
  <line x1="578" y1="242" x2="645" y2="230" stroke="#00d4ff" stroke-width="15" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="645" y1="230" x2="700" y2="230" stroke="#00d4ff" stroke-width="12" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Extended foot -->
  <ellipse cx="703" cy="231" rx="13" ry="8" fill="#2a2a2a"/>
  <!-- Glute & balance glow -->
  <ellipse cx="578" cy="250" rx="30" ry="22" fill="#00d4ff" opacity="0.2" filter="url(#glow)"/>
  <!-- Ground foot -->
  <ellipse cx="558" cy="334" rx="16" ry="9" fill="#2a2a2a"/>
  <!-- Ground -->
  <line x1="420" y1="342" x2="780" y2="342" stroke="#2a3f55" stroke-width="2"/>
</svg>
