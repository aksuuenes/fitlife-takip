<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1e2a3a"/><stop offset="100%" style="stop-color:#162030"/></linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect x="10" y="10" width="380" height="380" rx="12" fill="#212e3e" stroke="#00d4ff22" stroke-width="1.5"/>
  <rect x="410" y="10" width="380" height="380" rx="12" fill="#253447" stroke="#00d4ff22" stroke-width="1.5"/>

  <!-- LEFT: Plank feet together -->
  <circle cx="102" cy="188" r="20" fill="#c8a06a" stroke="#e0b87a" stroke-width="1.5"/>
  <ellipse cx="102" cy="175" rx="18" ry="10" fill="#3a2a1a"/>
  <rect x="111" y="187" width="10" height="12" rx="3" fill="#c8a06a"/>
  <!-- Torso -->
  <rect x="120" y="182" width="145" height="26" rx="10" fill="#4a90d9"/>
  <ellipse cx="193" cy="195" rx="52" ry="10" fill="#00d4ff" opacity="0.3"/>
  <!-- Arms -->
  <line x1="124" y1="195" x2="97" y2="250" stroke="#4a90d9" stroke-width="12" stroke-linecap="round"/>
  <line x1="136" y1="197" x2="110" y2="252" stroke="#3a80c9" stroke-width="12" stroke-linecap="round"/>
  <ellipse cx="95" cy="253" rx="12" ry="7" fill="#c8a06a"/>
  <ellipse cx="108" cy="255" rx="12" ry="7" fill="#b89060"/>
  <!-- Shoulder highlight -->
  <circle cx="126" cy="190" r="11" fill="#00d4ff" opacity="0.45" filter="url(#glow)"/>
  <!-- Legs: feet TOGETHER -->
  <line x1="265" y1="192" x2="360" y2="198" stroke="#4a90d9" stroke-width="15" stroke-linecap="round"/>
  <line x1="265" y1="200" x2="360" y2="206" stroke="#3a80c9" stroke-width="13" stroke-linecap="round"/>
  <!-- Feet together -->
  <ellipse cx="362" cy="200" rx="12" ry="7" fill="#2a2a2a"/>
  <ellipse cx="362" cy="208" rx="12" ry="7" fill="#2a2a2a"/>
  <!-- Ground -->
  <line x1="20" y1="262" x2="380" y2="262" stroke="#2a3f55" stroke-width="2"/>

  <!-- RIGHT: Plank feet spread wide -->
  <circle cx="502" cy="188" r="20" fill="#c8a06a" stroke="#e0b87a" stroke-width="1.5"/>
  <ellipse cx="502" cy="175" rx="18" ry="10" fill="#3a2a1a"/>
  <rect x="511" y="187" width="10" height="12" rx="3" fill="#c8a06a"/>
  <rect x="520" y="182" width="145" height="26" rx="10" fill="#4a90d9"/>
  <ellipse cx="593" cy="195" rx="52" ry="10" fill="#00d4ff" opacity="0.45" filter="url(#glow)"/>
  <line x1="524" y1="195" x2="497" y2="250" stroke="#4a90d9" stroke-width="12" stroke-linecap="round"/>
  <line x1="536" y1="197" x2="510" y2="252" stroke="#3a80c9" stroke-width="12" stroke-linecap="round"/>
  <ellipse cx="495" cy="253" rx="12" ry="7" fill="#c8a06a"/>
  <ellipse cx="508" cy="255" rx="12" ry="7" fill="#b89060"/>
  <circle cx="526" cy="190" r="11" fill="#00d4ff" opacity="0.5" filter="url(#glow)"/>
  <!-- Legs: feet SPREAD (cyan - muscles working) -->
  <line x1="665" y1="192" x2="755" y2="178" stroke="#00d4ff" stroke-width="15" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="665" y1="200" x2="755" y2="218" stroke="#00d4ff" stroke-width="13" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Feet spread -->
  <ellipse cx="758" cy="176" rx="12" ry="7" fill="#2a2a2a"/>
  <ellipse cx="758" cy="220" rx="12" ry="7" fill="#2a2a2a"/>
  <!-- Hip abductor glow -->
  <ellipse cx="700" cy="198" rx="45" ry="28" fill="#00d4ff" opacity="0.2" filter="url(#glow)"/>
  <!-- Ground -->
  <line x1="420" y1="262" x2="780" y2="262" stroke="#2a3f55" stroke-width="2"/>
</svg>
