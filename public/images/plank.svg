<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1e2a3a"/><stop offset="100%" style="stop-color:#162030"/></linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect x="10" y="10" width="380" height="380" rx="12" fill="#212e3e" stroke="#00d4ff22" stroke-width="1.5"/>
  <rect x="410" y="10" width="380" height="380" rx="12" fill="#253447" stroke="#00d4ff22" stroke-width="1.5"/>

  <!-- LEFT: Plank on hands (high plank) -->
  <circle cx="100" cy="188" r="20" fill="#c8a06a" stroke="#e0b87a" stroke-width="1.5"/>
  <ellipse cx="100" cy="175" rx="18" ry="10" fill="#3a2a1a"/>
  <rect x="109" y="187" width="10" height="12" rx="3" fill="#c8a06a"/>
  <!-- Torso straight -->
  <rect x="118" y="181" width="155" height="26" rx="10" fill="#4a90d9"/>
  <!-- Core glow -->
  <ellipse cx="196" cy="194" rx="58" ry="10" fill="#00d4ff" opacity="0.35" filter="url(#glow)"/>
  <!-- Shoulder highlight -->
  <circle cx="122" cy="189" r="12" fill="#00d4ff" opacity="0.5" filter="url(#glow)"/>
  <!-- Arms STRAIGHT (on hands) -->
  <line x1="122" y1="196" x2="95" y2="255" stroke="#4a90d9" stroke-width="13" stroke-linecap="round"/>
  <line x1="135" y1="198" x2="108" y2="257" stroke="#3a80c9" stroke-width="13" stroke-linecap="round"/>
  <!-- Hands on ground -->
  <ellipse cx="92" cy="258" rx="13" ry="8" fill="#c8a06a"/>
  <ellipse cx="106" cy="260" rx="13" ry="8" fill="#b89060"/>
  <!-- Wrist/arm highlight -->
  <ellipse cx="100" cy="226" rx="12" ry="20" fill="#00d4ff" opacity="0.2" filter="url(#glow)"/>
  <!-- Legs extended -->
  <line x1="273" y1="191" x2="365" y2="200" stroke="#4a90d9" stroke-width="15" stroke-linecap="round"/>
  <line x1="273" y1="199" x2="365" y2="208" stroke="#3a80c9" stroke-width="13" stroke-linecap="round"/>
  <ellipse cx="368" cy="202" rx="12" ry="7" fill="#2a2a2a"/>
  <ellipse cx="368" cy="210" rx="12" ry="7" fill="#2a2a2a"/>
  <!-- Ground -->
  <line x1="20" y1="268" x2="380" y2="268" stroke="#2a3f55" stroke-width="2"/>

  <!-- RIGHT: Forearm plank -->
  <circle cx="502" cy="195" r="20" fill="#c8a06a" stroke="#e0b87a" stroke-width="1.5"/>
  <ellipse cx="502" cy="182" rx="18" ry="10" fill="#3a2a1a"/>
  <rect x="511" y="194" width="10" height="12" rx="3" fill="#c8a06a"/>
  <!-- Torso -->
  <rect x="520" y="188" width="155" height="26" rx="10" fill="#4a90d9"/>
  <!-- Core glow (more active holding forearm plank) -->
  <ellipse cx="598" cy="201" rx="58" ry="10" fill="#00d4ff" opacity="0.5" filter="url(#glow)"/>
  <!-- FOREARMS on ground (not hands) -->
  <line x1="522" y1="202" x2="500" y2="260" stroke="#00d4ff" stroke-width="14" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="535" y1="204" x2="518" y2="263" stroke="#00d4ff" stroke-width="14" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Forearm flat on ground -->
  <line x1="500" y1="260" x2="468" y2="263" stroke="#00d4ff" stroke-width="12" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="518" y1="263" x2="488" y2="266" stroke="#00d4ff" stroke-width="11" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Elbow highlights -->
  <circle cx="500" cy="261" r="10" fill="#00d4ff" opacity="0.55" filter="url(#glow)"/>
  <circle cx="518" cy="264" r="10" fill="#00d4ff" opacity="0.55" filter="url(#glow)"/>
  <!-- Shoulder/deltoid glow -->
  <circle cx="524" cy="196" r="13" fill="#00d4ff" opacity="0.45" filter="url(#glow)"/>
  <!-- Legs extended -->
  <line x1="675" y1="198" x2="760" y2="207" stroke="#4a90d9" stroke-width="15" stroke-linecap="round"/>
  <line x1="675" y1="206" x2="760" y2="215" stroke="#3a80c9" stroke-width="13" stroke-linecap="round"/>
  <ellipse cx="763" cy="209" rx="12" ry="7" fill="#2a2a2a"/>
  <ellipse cx="763" cy="217" rx="12" ry="7" fill="#2a2a2a"/>
  <!-- Ground -->
  <line x1="420" y1="275" x2="780" y2="275" stroke="#2a3f55" stroke-width="2"/>
</svg>
