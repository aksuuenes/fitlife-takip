<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1e2a3a"/><stop offset="100%" style="stop-color:#162030"/></linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect x="10" y="10" width="380" height="380" rx="12" fill="#212e3e" stroke="#00d4ff22" stroke-width="1.5"/>
  <rect x="410" y="10" width="380" height="380" rx="12" fill="#253447" stroke="#00d4ff22" stroke-width="1.5"/>

  <!-- LEFT: Squat start - standing, feet shoulder width -->
  <circle cx="200" cy="100" r="22" fill="#c8a06a" stroke="#e0b87a" stroke-width="1.5"/>
  <ellipse cx="200" cy="86" rx="19" ry="11" fill="#3a2a1a"/>
  <rect x="192" y="120" width="16" height="14" rx="4" fill="#c8a06a"/>
  <!-- Torso -->
  <rect x="176" y="133" width="48" height="80" rx="12" fill="#4a90d9"/>
  <line x1="200" y1="140" x2="200" y2="200" stroke="#00d4ff" stroke-width="1.5" opacity="0.35"/>
  <!-- Quad/leg highlights (resting) -->
  <ellipse cx="200" cy="158" rx="22" ry="10" fill="#00d4ff" opacity="0.2"/>
  <!-- Arms at sides -->
  <line x1="178" y1="145" x2="158" y2="205" stroke="#4a90d9" stroke-width="13" stroke-linecap="round"/>
  <line x1="222" y1="145" x2="242" y2="205" stroke="#4a90d9" stroke-width="13" stroke-linecap="round"/>
  <ellipse cx="156" cy="208" rx="10" ry="7" fill="#c8a06a"/>
  <ellipse cx="244" cy="208" rx="10" ry="7" fill="#c8a06a"/>
  <!-- Legs straight -->
  <line x1="190" y1="213" x2="178" y2="315" stroke="#4a90d9" stroke-width="16" stroke-linecap="round"/>
  <line x1="210" y1="213" x2="222" y2="315" stroke="#3a80c9" stroke-width="16" stroke-linecap="round"/>
  <!-- Feet (shoulder width) -->
  <ellipse cx="174" cy="319" rx="16" ry="9" fill="#2a2a2a"/>
  <ellipse cx="226" cy="319" rx="16" ry="9" fill="#2a2a2a"/>
  <!-- Ground -->
  <line x1="20" y1="330" x2="380" y2="330" stroke="#2a3f55" stroke-width="2"/>

  <!-- RIGHT: Squat working - deep squat position -->
  <circle cx="600" cy="138" r="22" fill="#c8a06a" stroke="#e0b87a" stroke-width="1.5"/>
  <ellipse cx="600" cy="124" rx="19" ry="11" fill="#3a2a1a"/>
  <rect x="592" y="158" width="16" height="14" rx="4" fill="#c8a06a"/>
  <!-- Torso leaning forward slightly -->
  <rect x="577" y="170" width="46" height="65" rx="12" fill="#4a90d9"/>
  <line x1="600" y1="178" x2="600" y2="222" stroke="#00d4ff" stroke-width="1.5" opacity="0.35"/>
  <!-- Arms extended forward for balance -->
  <line x1="579" y1="185" x2="535" y2="190" stroke="#4a90d9" stroke-width="12" stroke-linecap="round"/>
  <line x1="623" y1="185" x2="665" y2="190" stroke="#4a90d9" stroke-width="12" stroke-linecap="round"/>
  <ellipse cx="532" cy="191" rx="10" ry="7" fill="#c8a06a"/>
  <ellipse cx="668" cy="191" rx="10" ry="7" fill="#c8a06a"/>
  <!-- Thighs (CYAN - quadriceps working) -->
  <line x1="588" y1="235" x2="548" y2="270" stroke="#00d4ff" stroke-width="17" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="612" y1="235" x2="652" y2="270" stroke="#00d4ff" stroke-width="17" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Quads glow -->
  <ellipse cx="570" cy="252" rx="25" ry="18" fill="#00d4ff" opacity="0.35" filter="url(#glow)"/>
  <ellipse cx="630" cy="252" rx="25" ry="18" fill="#00d4ff" opacity="0.35" filter="url(#glow)"/>
  <!-- Lower legs -->
  <line x1="548" y1="270" x2="545" y2="315" stroke="#4a90d9" stroke-width="14" stroke-linecap="round"/>
  <line x1="652" y1="270" x2="655" y2="315" stroke="#3a80c9" stroke-width="14" stroke-linecap="round"/>
  <!-- Glutes at bottom (highlighted) -->
  <ellipse cx="600" cy="237" rx="28" ry="15" fill="#00d4ff" opacity="0.3" filter="url(#glow)"/>
  <!-- Feet -->
  <ellipse cx="541" cy="319" rx="16" ry="9" fill="#2a2a2a"/>
  <ellipse cx="659" cy="319" rx="16" ry="9" fill="#2a2a2a"/>
  <!-- Ground -->
  <line x1="420" y1="330" x2="780" y2="330" stroke="#2a3f55" stroke-width="2"/>
</svg>
